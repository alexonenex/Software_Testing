<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件测试管理平台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 12l2 2 4-4"/>
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                    <span>测试管理平台</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                    </svg>
                    <span>仪表盘</span>
                </a>
                <a href="#" class="nav-item" data-page="projects">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                    </svg>
                    <span>项目管理</span>
                </a>
                <a href="#" class="nav-item" data-page="runner">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    <span>运行测试</span>
                </a>
                <a href="#" class="nav-item" data-page="results">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <span>测试结果</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 仪表盘 -->
            <div class="page active" id="page-dashboard">
                <div class="page-header">
                    <h1>仪表盘</h1>
                    <button class="btn btn-primary" onclick="refreshDashboard()">刷新</button>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">项目总数</span>
                            <span class="stat-value" id="stat-projects">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">通过率</span>
                            <span class="stat-value" id="stat-passrate">0%</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">运行次数</span>
                            <span class="stat-value" id="stat-runs">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">最近运行</span>
                            <span class="stat-value" id="stat-latest">--</span>
                        </div>
                    </div>
                </div>
                <div class="card" id="latest-run-card" style="display:none">
                    <h3>最近一次运行</h3>
                    <div id="latest-run-detail"></div>
                </div>
            </div>

            <!-- 项目管理 -->
            <div class="page" id="page-projects">
                <div class="page-header">
                    <h1>项目管理</h1>
                    <button class="btn btn-primary" onclick="showCreateProjectModal()">新建项目</button>
                </div>
                <div class="projects-list" id="projects-list"></div>
            </div>

            <!-- 运行测试 -->
            <div class="page" id="page-runner">
                <div class="page-header">
                    <h1>运行测试</h1>
                </div>
                <div class="runner-panel">
                    <div class="runner-form card">
                        <h3>选择运行配置</h3>
                        <div class="form-group">
                            <label>测试项目</label>
                            <select id="run-project">
                                <option value="">所有项目</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Markers 标记</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" value="web"> Web</label>
                                <label><input type="checkbox" value="smoke"> 冒烟</label>
                                <label><input type="checkbox" value="regression"> 回归</label>
                                <label><input type="checkbox" value="p0"> P0</label>
                                <label><input type="checkbox" value="p1"> P1</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>额外参数</label>
                            <input type="text" id="run-extra-args" placeholder="如: -k test_search">
                        </div>
                        <button class="btn btn-primary btn-large" onclick="startTestRun()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            开始运行
                        </button>
                    </div>
                    <div class="runner-output card">
                        <div class="output-header">
                            <h3>运行输出</h3>
                            <span class="status-badge" id="run-status">等待中</span>
                        </div>
                        <pre class="output-console" id="run-output">等待运行测试...</pre>
                    </div>
                </div>
            </div>

            <!-- 测试结果 -->
            <div class="page" id="page-results">
                <div class="page-header">
                    <h1>测试结果</h1>
                    <button class="btn btn-primary" onclick="loadResults()">刷新</button>
                </div>
                <div class="results-list" id="results-list"></div>
            </div>
        </main>
    </div>

    <!-- 创建项目弹窗 -->
    <div class="modal" id="create-project-modal">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content card">
            <h3>新建测试项目</h3>
            <div class="form-group">
                <label>项目 ID（英文，目录名）</label>
                <input type="text" id="new-project-id" placeholder="如: my_project">
            </div>
            <div class="form-group">
                <label>项目名称</label>
                <input type="text" id="new-project-name" placeholder="如: 我的测试项目">
            </div>
            <div class="form-group">
                <label>项目描述</label>
                <input type="text" id="new-project-desc" placeholder="项目功能描述">
            </div>
            <div class="form-group">
                <label>被测站点 URL</label>
                <input type="text" id="new-project-url" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label>优先级</label>
                <select id="new-project-priority">
                    <option value="p0">P0 - 最高</option>
                    <option value="p1">P1 - 高</option>
                    <option value="p2" selected>P2 - 中</option>
                    <option value="p3">P3 - 低</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="createProject()">创建</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        let currentRunId = null;
        let pollTimer = null;

        // ==================== 页面导航 ====================
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const page = item.dataset.page;
                switchPage(page);
            });
        });

        function switchPage(page) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            document.getElementById(`page-${page}`).classList.add('active');

            if (page === 'dashboard') refreshDashboard();
            if (page === 'projects') loadProjects();
            if (page === 'runner') loadProjectOptions();
            if (page === 'results') loadResults();
        }

        // ==================== 仪表盘 ====================
        async function refreshDashboard() {
            const res = await fetch(`${API}/dashboard`);
            const data = await res.json();
            document.getElementById('stat-projects').textContent = data.project_count;
            document.getElementById('stat-passrate').textContent = data.pass_rate + '%';
            document.getElementById('stat-runs').textContent = data.total_runs;
            document.getElementById('stat-latest').textContent = data.latest_run ? data.latest_run.timestamp.slice(0, 16) : '--';

            if (data.latest_run) {
                document.getElementById('latest-run-card').style.display = 'block';
                const r = data.latest_run;
                const s = r.summary || {};
                document.getElementById('latest-run-detail').innerHTML = `
                    <div class="run-summary">
                        <span class="badge ${r.status === 'passed' ? 'badge-green' : 'badge-red'}">${r.status}</span>
                        <span>项目: ${r.project}</span>
                        <span>通过: ${s.passed || 0} / 总计: ${s.total || 0}</span>
                        <span>耗时: ${s.duration || 0}s</span>
                    </div>
                `;
            }
        }

        // ==================== 项目管理 ====================
        async function loadProjects() {
            const res = await fetch(`${API}/projects`);
            const data = await res.json();
            const list = document.getElementById('projects-list');

            if (data.projects.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无项目，点击"新建项目"创建第一个测试项目</div>';
                return;
            }

            list.innerHTML = data.projects.map(p => `
                <div class="project-card card">
                    <div class="project-info">
                        <h3>${p.name}</h3>
                        <p>${p.description || '暂无描述'}</p>
                        <div class="project-meta">
                            <span>ID: ${p.id}</span>
                            <span>测试数: ${p.test_count}</span>
                            <span>优先级: ${p.priority || '--'}</span>
                        </div>
                    </div>
                    <div class="project-actions">
                        <button class="btn btn-sm btn-primary" onclick="runProject('${p.id}')">运行</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProject('${p.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function showCreateProjectModal() {
            document.getElementById('create-project-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('create-project-modal').classList.remove('active');
        }

        async function createProject() {
            const data = {
                name: document.getElementById('new-project-id').value,
                display_name: document.getElementById('new-project-name').value,
                description: document.getElementById('new-project-desc').value,
                base_url: document.getElementById('new-project-url').value,
                priority: document.getElementById('new-project-priority').value,
            };
            if (!data.name) { alert('请输入项目 ID'); return; }

            const res = await fetch(`${API}/projects`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            const result = await res.json();
            if (res.ok) {
                alert(result.message);
                closeModal();
                loadProjects();
            } else {
                alert(result.error);
            }
        }

        async function deleteProject(id) {
            if (!confirm(`确认删除项目 "${id}"？`)) return;
            await fetch(`${API}/projects/${id}`, { method: 'DELETE' });
            loadProjects();
        }

        // ==================== 运行测试 ====================
        async function loadProjectOptions() {
            const res = await fetch(`${API}/projects`);
            const data = await res.json();
            const select = document.getElementById('run-project');
            select.innerHTML = '<option value="">所有项目</option>' +
                data.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        function runProject(projectId) {
            switchPage('runner');
            setTimeout(() => {
                document.getElementById('run-project').value = projectId;
                startTestRun();
            }, 300);
        }

        async function startTestRun() {
            const project = document.getElementById('run-project').value;
            const markers = Array.from(document.querySelectorAll('.checkbox-group input:checked')).map(c => c.value);
            const extraArgs = document.getElementById('run-extra-args').value;

            const res = await fetch(`${API}/run`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ project, markers, extra_args: extraArgs }),
            });
            const data = await res.json();

            if (res.ok) {
                currentRunId = data.run_id;
                document.getElementById('run-output').textContent = '测试启动中...\n';
                document.getElementById('run-status').textContent = '运行中';
                document.getElementById('run-status').className = 'status-badge status-running';
                pollRunStatus();
            } else {
                alert(data.error);
            }
        }

        function pollRunStatus() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(async () => {
                if (!currentRunId) return;
                const res = await fetch(`${API}/run/${currentRunId}/status`);
                const data = await res.json();

                document.getElementById('run-output').textContent = data.output || '等待输出...';
                const statusEl = document.getElementById('run-status');

                if (data.status === 'running') {
                    statusEl.textContent = '运行中';
                    statusEl.className = 'status-badge status-running';
                } else if (data.status === 'passed') {
                    statusEl.textContent = '全部通过';
                    statusEl.className = 'status-badge status-passed';
                    clearInterval(pollTimer);
                } else if (data.status === 'failed') {
                    statusEl.textContent = '存在失败';
                    statusEl.className = 'status-badge status-failed';
                    clearInterval(pollTimer);
                } else if (data.status === 'timeout') {
                    statusEl.textContent = '超时';
                    statusEl.className = 'status-badge status-failed';
                    clearInterval(pollTimer);
                }

                // 自动滚动到底部
                const output = document.getElementById('run-output');
                output.scrollTop = output.scrollHeight;
            }, 1000);
        }

        // ==================== 测试结果 ====================
        async function loadResults() {
            const res = await fetch(`${API}/results`);
            const data = await res.json();
            const list = document.getElementById('results-list');

            if (data.results.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无测试记录，请先运行一次测试</div>';
                return;
            }

            list.innerHTML = data.results.map(r => {
                const s = r.summary || {};
                const statusClass = r.status === 'passed' ? 'badge-green' : (r.status === 'running' ? 'badge-blue' : 'badge-red');
                return `
                <div class="result-card card">
                    <div class="result-header">
                        <span class="badge ${statusClass}">${r.status}</span>
                        <span class="result-project">${r.project}</span>
                        <span class="result-time">${r.timestamp}</span>
                    </div>
                    <div class="result-summary">
                        ${s.total ? `<span>总计: ${s.total}</span><span class="text-green">通过: ${s.passed}</span><span class="text-red">失败: ${s.failed}</span><span>耗时: ${s.duration}s</span>` : '<span>无统计数据</span>'}
                    </div>
                </div>`;
            }).join('');
        }

        // 初始化
        refreshDashboard();
    </script>
</body>
</html>
