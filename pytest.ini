[pytest]
# 测试目录（projects 下的所有项目）
testpaths = projects
# 测试文件命名规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 命令行参数
addopts =
    -v
    --tb=short
    --reruns=2
    --reruns-delay=1
    -p no:cacheprovider
# 自定义标记
markers =
    web: Web UI 自动化测试
    smoke: 冒烟测试
    regression: 回归测试
    p0: 最高优先级
    p1: 高优先级
    p2: 中优先级
    p3: 低优先级
# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
